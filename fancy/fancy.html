<!doctype html>
<html>
  <a href="patch.jpg" data-fancybox="secondgallery" data-caption="Patch">
  <img src="patch_thumb.jpg">
</a>
<a href="icecream.jpg" data-fancybox="secondgallery" data-caption="Ice Cream">
  <img src="icecream_thumb.jpg">
</a>
<a href="water.jpg" data-fancybox="secondgallery" data-caption="Water">
  <img src="water_thumb.jpg">
</a>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.css" />

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/carousel/carousel.arrows.css" />

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/carousel/carousel.arrows.umd.js"></script> 
<title>Fancy Example</title>
  <link rel="stylesheet" href="fancy.css">
</head>

<body>
  <div id="wrapper">
    <h1>Fancy Example</h1>
  </div>

  <div class="f-carousel" id="myCarousel" >
    <div class="f-carousel__slide"><img src="patch.jpg"></div>
    <div class="f-carousel__slide"><img src="icecream.jpg"></div>
    <div class="f-carousel__slide"><img src="water.jpg"></div>
</div>

<div id="secondCarousel" class="f-carousel">
    <div class="f-carousel__slide"><img src="patch.jpg"></div>
    <div class="f-carousel__slide"><img src="icecream.jpg"></div>
    <div class="f-carousel__slide"><img src="water.jpg"></div>
</div>

  <a href="patch.jpg" data-fancybox="gallery" data-caption="Patch">
  <img src="patch_thumb.jpg">
</a>
<a href="icecream.jpg" data-fancybox="gallery" data-caption="Ice Cream">
  <img src="icecream_thumb.jpg">
</a>
<a href="water.jpg" data-fancybox="gallery" data-caption="Water">
  <img src="water_thumb.jpg">
</a>

<script>   
   Fancybox.bind("[data-fancybox]", {});
</script>

<script>
    const container = document.getElementById("myCarousel");
    const options = { infinite: false };
    Carousel(container, options).init();
    
    const container2 = document.getElementById("secondCarousel");
    const options2 = { infinite: false };
    Carousel(container2, options2).init();
</script>

</body>
</html>
